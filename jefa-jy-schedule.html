<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Cache-Control" content="no-cache">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JeFa JY Schedule</title>
    <style>
        body {
            line-height: 1.75;
            font-family: sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
        }
        .calendar-section {
            margin-bottom: 24px;
        }
        .calendar-section h2 {
            margin-bottom: 8px;
        }
        .calendar-section ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .calendar-section a,
        .copy-btn {
            text-decoration: underline;
            color: #0066cc;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            font-size: inherit;
            font-family: inherit;
        }
        .calendar-section a:hover,
        .copy-btn:hover {
            color: #004499;
        }
        .copied {
            border-color: #28a745;
            color: #28a745;
        }
        .note {
            font-size: 0.85em;
            color: #666;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <h1>JeFa JY Schedule</h1>
    <hr>
    <div id="calendars"></div>

    <script>
        const BASE_URL = 'webcal://yskfj.github.io/staticweb/ical/';
        const calendars = [
            { id: 'u13', label: 'U13' },
            { id: 'u14', label: 'U14' },
            { id: 't2',  label: 'T2' },
            { id: 'u15', label: 'U15' },
        ];

        const container = document.getElementById('calendars');

        const categories = [
            {
                title: 'iPhone（iOS）購読',
                linkFn: function(cal) {
                    var url = (BASE_URL + cal.id + '.ics');
                    return '<a href="' + url + '">' + cal.label + '</a>';
                }
            },
            {
                title: '手動で購読する（icsリンクをコピー）',
                note: '※ PCでカレンダーアプリや Google カレンダーを開き「外部カレンダーを追加」や「購読」からコピーした URL を貼り付けてください。',
                linkFn: function(cal) {
                    var url = BASE_URL + cal.id + '.ics';
                    return '<a href="javascript:void(0)" class="copy-btn" data-url="' + url + '">' + cal.label + '</a>';
                }
            },
            {
                title: 'Google カレンダー購読リンク（非推奨）',
                note: '※ Android設定→アプリ→（全てのアプリを表示）→カレンダー→デフォルトを開く<br>　　「対応リンクを開く」をOFFにした状態で以下リンクを開くとスマホでも登録できるっぽい<br>　　作業後に設定を戻すこと',
                linkFn: function(cal) {
                    var url = 'https://calendar.google.com/calendar/r?cid=' + encodeURIComponent(BASE_URL + cal.id + '.ics');
                    return '<a href="' + url + '" target="_blank" rel="noopener">' + cal.label + '</a>';
                }
            }
        ];

        categories.forEach(function(cat) {
            var section = document.createElement('div');
            section.className = 'calendar-section';
            var items = calendars.map(function(cal) {
                return '<li>' + cat.linkFn(cal) + '</li>';
            }).join('');
            var noteHtml = cat.note ? '<p class="note">' + cat.note + '</p>' : '';
            section.innerHTML = '<h2>' + cat.title + '</h2>' + noteHtml + '<ul>' + items + '</ul>';
            container.appendChild(section);
        });

        document.addEventListener('click', function(e) {
            if (!e.target.classList.contains('copy-btn')) return;
            var url = e.target.getAttribute('data-url');
            var btn = e.target;
            var originalText = btn.textContent;
            navigator.clipboard.writeText(url).then(function() {
                btn.textContent = originalText + ' - コピーしました!';
                btn.classList.add('copied');
                setTimeout(function() {
                    btn.textContent = originalText;
                    btn.classList.remove('copied');
                }, 2000);
            });
        });
    </script>
</body>
</html>
